apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-app-dev

spec:
  replicas: 1
  selector:
    matchLabels:
      app: cicd-app-dev
  template:
    metadata:
      labels:
        app: cicd-app-dev
    spec:
      containers:
      - name: multienv-cicd
        image: sahilmahat/multicicd:latest
        ports:
        - containerPort: 5000
        env:
        - name: ENVIRONMENT
          value: dev
